<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>اشترك في القناة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --yt-red: #ff0000;
            --yt-dark-red: #cc0000;
            --bg-dark: #0f0f0f;
            --text-light: #f1f1f1;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1f1f1f 0%, #0f0f0f 100%);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .container {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        /* زر الاشتراك الاحترافي */
        .subscribe-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background-color: var(--yt-red);
            color: var(--text-light);
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            font-weight: 900;
            padding: 18px 45px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulseGlow 2s infinite alternate;
        }

        /* أيقونة اليوتيوب داخل الزر */
        .yt-icon {
            width: clamp(30px, 8vw, 40px);
            height: auto;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        /* حركات التفاعل (Hover) */
        .subscribe-btn:hover {
            background-color: var(--yt-dark-red);
            transform: scale(1.08);
            box-shadow: 0 0 45px rgba(255, 0, 0, 0.7);
        }

        .subscribe-btn:hover .yt-icon {
            transform: scale(1.2) rotate(-5deg);
        }

        .subscribe-btn:active {
            transform: scale(0.95);
        }

        /* أنيميشن نبض الإضاءة للزر */
        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            }
            100% {
                box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            }
        }

        /* تأثير الزر بعد الاشتراك */
        .subscribed {
            background-color: #303030 !important;
            color: #aaaaaa !important;
            box-shadow: none !important;
            animation: none !important;
            pointer-events: none; /* لمنع تكرار الضغط */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- زر الاشتراك -->
        <button class="subscribe-btn" id="subBtn">
            <!-- أيقونة يوتيوب SVG عالية الدقة -->
            <svg class="yt-icon" viewBox="0 0 24 24">
                <path d="M23.498 6.163a3.003 3.003 0 0 0-2.11-2.11C19.517 3.545 12 3.545 12 3.545s-7.517 0-9.388.508a3.003 3.003 0 0 0-2.11 2.11C0 8.033 0 12 0 12s0 3.967.502 5.837a3.003 3.003 0 0 0 2.11 2.11c1.871.508 9.388.508 9.388.508s7.517 0 9.388-.508a3.003 3.003 0 0 0 2.11-2.11C24 15.967 24 12 24 12s0-3.967-.502-5.837zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
            <span id="btnText">اشترك الآن</span>
        </button>
    </div>

    <script>
        // ضع رابط قناتك على اليوتيوب هنا بدلاً من علامة السلم #
        const YOUTUBE_CHANNEL_URL = "https://www.youtube.com/@YOUR_CHANNEL_USERNAME?sub_confirmation=1";

        const subBtn = document.getElementById('subBtn');
        const btnText = document.getElementById('btnText');

        subBtn.addEventListener('click', () => {
            // فتح رابط القناة في نافذة جديدة
            window.open(YOUTUBE_CHANNEL_URL, '_blank');

            // تغيير حالة الزر ليعطي انطباعاً تفاعلياً رائعاً بالنجاح
            btnText.textContent = "تم الاشتراك ✓";
            subBtn.classList.add('subscribed');
        });
    </script>
</body>
</html>
