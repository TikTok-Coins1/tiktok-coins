<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عملات تيك توك مجانية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --pink: #fe0979;
            --cyan: #00f2fe;
            --bg-deep: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f4;
            --text-secondary: rgba(240, 240, 244, 0.6);
            --surface-1: #12121a;
            --surface-2: #1a1a24;
            --success: #22c55e;
            --error: #ef4444;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.7;
            font-optical-sizing: auto;
        }

        #money-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            transition: opacity 1s ease-out;
        }

        #money-canvas.fade-out {
            opacity: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 20px 64px;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow--pink {
            background: var(--pink);
            top: -200px;
            right: -100px;
        }

        .bg-glow--cyan {
            background: var(--cyan);
            bottom: -200px;
            left: -100px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            animation: fadeSlideDown 0.8s var(--ease-out-expo) both;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            position: relative;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
        }

        .header-section {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeSlideDown 0.8s var(--ease-out-expo) 0.1s both;
        }

        .header-section h1 {
            font-size: clamp(1.75rem, 5vw, 2.75rem);
            font-weight: 900;
            line-height: 1.3;
            margin-bottom: 12px;
            text-shadow: 0 0 60px rgba(254, 9, 121, 0.4), 0 0 120px rgba(0, 242, 254, 0.2);
        }

        .header-section h1 .highlight-pink {
            color: var(--pink);
        }

        .header-section h1 .highlight-cyan {
            color: var(--cyan);
        }

        .header-section p {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 50ch;
            margin: 0 auto;
        }

        .main-card {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--bg-card-border);
            border-radius: 24px;
            padding: 32px 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: fadeSlideDown 0.8s var(--ease-out-expo) 0.2s both;
        }

        .section-label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-label .step-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--bg-deep);
            flex-shrink: 0;
        }

        .input-group {
            margin-bottom: 28px;
        }

        .input-group label {
            display: block;
            font-size: 0.9375rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 8px;
        }

        .input-field {
            flex: 1;
            background: var(--surface-1);
            border: 1.5px solid var(--bg-card-border);
            border-radius: 14px;
            padding: 14px 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9375rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.3s var(--ease-out-expo), box-shadow 0.3s var(--ease-out-expo);
            direction: ltr;
            text-align: right;
        }

        .input-field::placeholder {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .input-field:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0, 242, 254, 0.1);
        }

        .input-field.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
            animation: shake 0.5s var(--ease-out-expo);
        }

        .input-field.success {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        .submit-btn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--pink), #d60065);
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9375rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s var(--ease-out-expo), opacity 0.2s;
            white-space: nowrap;
            min-width: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .submit-btn:hover:not(:disabled) {
            transform: scale(1.03);
        }

        .submit-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .spinner-small {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .validation-msg {
            margin-top: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.3s, transform 0.3s var(--ease-out-expo);
        }

        .validation-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .validation-msg.error {
            color: var(--error);
        }

        .validation-msg.success {
            color: var(--success);
        }

        /* Captcha Section */
        .captcha-section {
            margin-bottom: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-card-border);
            display: none;
        }

        .captcha-section.visible {
            display: block;
            animation: fadeSlideDown 0.5s var(--ease-out-expo) both;
        }

        .captcha-box {
            background: var(--surface-1);
            border: 1.5px solid var(--bg-card-border);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            user-select: none;
        }

        .captcha-box:hover:not(.solved) {
            border-color: rgba(255, 255, 255, 0.15);
            background: var(--surface-2);
        }

        .captcha-box.solved {
            border-color: var(--success);
            cursor: default;
        }

        .captcha-checkbox {
            width: 26px;
            height: 26px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s var(--ease-out-expo);
        }

        .captcha-checkbox.loading {
            border-color: var(--cyan);
        }

        .captcha-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .captcha-checkbox svg {
            width: 15px;
            height: 15px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.3s var(--ease-out-expo);
        }

        .captcha-checkbox.checked svg {
            opacity: 1;
            transform: scale(1);
        }

        .captcha-text {
            flex: 1;
        }

        .captcha-label {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
        }

        .captcha-sublabel {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: block;
            margin-top: 2px;
        }

        .captcha-icon {
            opacity: 0.4;
            display: flex;
            align-items: center;
        }

        .captcha-icon svg {
            width: 28px;
            height: 28px;
        }

        /* Subscribe Section */
        .subscribe-section {
            margin-bottom: 28px;
            padding-top: 24px;
            border-top: 1px solid var(--bg-card-border);
        }

        .subscribe-section label {
            display: block;
            font-size: 0.9375rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .youtube-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            background: #cc0000;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s var(--ease-out-expo), box-shadow 0.3s, background 0.3s;
            box-shadow: 0 4px 24px rgba(204, 0, 0, 0.3);
        }

        .youtube-btn:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 6px 32px rgba(204, 0, 0, 0.45);
        }

        .youtube-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .youtube-btn:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .youtube-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Final CTA */
        .final-cta {
            padding-top: 24px;
            border-top: 1px solid var(--bg-card-border);
            display: none;
        }

        .final-cta.visible {
            display: block;
            animation: fadeSlideDown 0.5s var(--ease-out-expo) both;
        }

        .cta-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--cyan), #00c4cc);
            color: var(--bg-deep);
            font-family: 'Cairo', sans-serif;
            font-size: 1.125rem;
            font-weight: 800;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s var(--ease-out-expo);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .cta-btn:hover {
            transform: scale(1.02);
        }

        .cta-btn:active {
            transform: scale(0.98);
        }

        .footer-note {
            margin-top: 32px;
            text-align: center;
            font-size: 0.8125rem;
            color: var(--text-secondary);
            opacity: 0.5;
            animation: fadeSlideDown 0.8s var(--ease-out-expo) 0.4s both;
        }

        /* Animations */
        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 4px 24px rgba(0, 242, 254, 0.3);
            }
            50% {
                box-shadow: 0 6px 40px rgba(0, 242, 254, 0.55);
            }
        }

        /* Responsive */
        @media (max-width: 520px) {
            .page-wrapper {
                padding: 32px 16px 48px;
            }

            .main-card {
                padding: 24px 18px;
                border-radius: 20px;
            }

            .input-wrapper {
                flex-direction: column;
            }

            .submit-btn {
                width: 100%;
            }

            .bg-glow {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <canvas id="money-canvas"></canvas>

    <div class="bg-glow bg-glow--pink"></div>
    <div class="bg-glow bg-glow--cyan"></div>

    <div class="page-wrapper">
        <div class="logo-area">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="none">
                    <path d="M34.1 11.4A8.4 8.4 0 0 1 28.7 4h-5.8v27.2a5.2 5.2 0 1 1-3.6-4.9V20.3a11.2 11.2 0 1 0 9.6 11.1V17.7a14.3 14.3 0 0 0 8.4 2.7v-6a8.4 8.4 0 0 1-3.2-3z" fill="url(#grad1)"/>
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00f2fe"/>
                            <stop offset="100%" stop-color="#fe0979"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <span style="font-weight: 800; font-size: 1.125rem;">TikTok Coins</span>
        </div>

        <section class="header-section">
            <h1>احصل على <span class="highlight-pink">عملات تيك توك</span> <span class="highlight-cyan">مجانية</span> الآن!</h1>
            <p>أدخل رابط حسابك واحصل على عملاتك خلال دقائق معدودة</p>
        </section>

        <div class="main-card">
            <!-- Step 1: Input -->
            <div class="input-group">
                <div class="section-label">
                    <span class="step-num">1</span>
                    أدخل رابط حسابك
                </div>
                <label for="tiktok-link">يرجى لصق رابط حسابك الشخصي هنا</label>
                <div class="input-wrapper">
                    <input 
                        type="url" 
                        id="tiktok-link" 
                        class="input-field" 
                        placeholder="https://tiktok.com/@username"
                        autocomplete="off"
                    >
                    <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">إرسال</button>
                </div>
                <div class="validation-msg" id="validation-msg"></div>
            </div>

            <!-- Step 2: Simple Captcha (appears after valid URL) -->
            <div class="captcha-section" id="captcha-section">
                <div class="section-label">
                    <span class="step-num">2</span>
                    تحقق أنك لست روبوت
                </div>
                <div class="captcha-box" id="captcha-box" onclick="handleCaptcha()">
                    <div class="captcha-checkbox" id="captcha-checkbox">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </div>
                    <div class="captcha-text">
                        <span class="captcha-label">أنا لست برنامج روبوت</span>
                        <span class="captcha-sublabel">اضغط للتحقق</span>
                    </div>
                    <div class="captcha-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Step 3: Subscribe -->
            <div class="subscribe-section">
                <div class="section-label">
                    <span class="step-num">3</span>
                    اشترك للحصول على مكافأتك
                </div>
                <label>اشترك في هذه القناة للحصول على مكافأتك</label>
                <button class="youtube-btn" id="youtube-btn" onclick="handleYoutubeSubscribe()">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8zM9.6 15.6V8.4l6.3 3.6-6.3 3.6z"/>
                    </svg>
                    <span id="youtube-btn-text">اشترك الآن</span>
                </button>
            </div>

            <!-- Final CTA -->
            <div class="final-cta" id="final-cta">
                <button class="cta-btn" onclick="claimCoins()">احصل على العملات الآن 🎉</button>
            </div>
        </div>

        <p class="footer-note">هذه الخدمة مجانية بالكامل ولا تتطلب أي معلومات حساسة</p>
    </div>

    <script>
        // === FALLING MONEY ANIMATION ===
        const canvas = document.getElementById('money-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationId;
        let startTime;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        class MoneyParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -50 - Math.random() * 400;
                this.size = 20 + Math.random() * 20;
                this.speed = 1.5 + Math.random() * 2.5;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.04;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.02;
                this.wobbleAmount = 0.5 + Math.random() * 1.5;
                this.type = Math.random() > 0.5 ? 'bill' : 'coin';
                this.opacity = 0.7 + Math.random() * 0.3;
            }

            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                if (this.type === 'bill') {
                    const w = this.size * 1.8;
                    const h = this.size;
                    ctx.fillStyle = '#22c55e';
                    ctx.strokeStyle = '#15803d';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.roundRect(-w/2, -h/2, w, h, 3);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = '#15803d';
                    ctx.font = `bold ${this.size * 0.6}px Cairo`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('$', 0, 0);
                } else {
                    const r = this.size * 0.5;
                    const gradient = ctx.createRadialGradient(0, -r*0.3, 0, 0, 0, r);
                    gradient.addColorStop(0, '#fde047');
                    gradient.addColorStop(0.7, '#f59e0b');
                    gradient.addColorStop(1, '#b45309');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(0, 0, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#92400e';
                    ctx.font = `bold ${this.size * 0.4}px Cairo`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('T', 0, 0);
                }

                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const count = Math.min(60, Math.floor(window.innerWidth / 15));
            for (let i = 0; i < count; i++) {
                particles.push(new MoneyParticle());
            }
        }

        function animateMoney(timestamp) {
            if (!startTime) startTime = timestamp;
            const elapsed = timestamp - startTime;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (elapsed > 4500) {
                canvas.classList.add('fade-out');
            }

            if (elapsed > 6000) {
                cancelAnimationFrame(animationId);
                canvas.style.display = 'none';
                return;
            }

            particles.forEach(p => {
                p.update();
                p.draw();
                if (p.y > canvas.height + 60) {
                    if (elapsed < 3500) {
                        p.y = -50;
                        p.x = Math.random() * canvas.width;
                    }
                }
            });

            animationId = requestAnimationFrame(animateMoney);
        }

        initParticles();
        animationId = requestAnimationFrame(animateMoney);

        // === STATE VARIABLES ===
        let captchaSolved = false;
        let youtubeSubscribed = false;

        // === INPUT VALIDATION ===
        function handleSubmit() {
            const input = document.getElementById('tiktok-link');
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('validation-msg');
            const value = input.value.trim();

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';
            input.classList.remove('error', 'success');
            msg.classList.remove('visible', 'error', 'success');

            setTimeout(() => {
                const isValid = validateTikTokUrl(value);

                btn.disabled = false;
                btn.textContent = 'إرسال';

                if (isValid) {
                    input.classList.add('success');
                    msg.innerHTML = '✔️ تم التحقق من الرابط بنجاح';
                    msg.className = 'validation-msg visible success';
                    // Show captcha
                    setTimeout(() => {
                        document.getElementById('captcha-section').classList.add('visible');
                        document.getElementById('captcha-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 400);
                } else {
                    input.classList.add('error');
                    msg.innerHTML = '❌ الرجاء إدخال رابط تيك توك صحيح';
                    msg.className = 'validation-msg visible error';
                }
            }, 2000);
        }

        function validateTikTokUrl(url) {
            if (!url) return false;
            if (/^@[\w.]+$/.test(url)) return true;
            const tiktokRegex = /^(https?:\/\/)?(www\.|vm\.)?tiktok\.com\/@?[\w.-]+/i;
            return tiktokRegex.test(url);
        }

        // === SIMPLE CAPTCHA ===
        function handleCaptcha() {
            if (captchaSolved) return;

            const checkbox = document.getElementById('captcha-checkbox');
            const box = document.getElementById('captcha-box');
            const sublabel = box.querySelector('.captcha-sublabel');

            // Show loading state
            checkbox.innerHTML = '<div class="spinner-small"></div>';
            checkbox.classList.add('loading');
            sublabel.textContent = 'جاري التحقق...';

            // Simulate verification (1.5s)
            setTimeout(() => {
                captchaSolved = true;
                checkbox.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                checkbox.classList.remove('loading');
                checkbox.classList.add('checked');
                box.classList.add('solved');
                sublabel.textContent = 'تم التحقق بنجاح';

                // Attempt to unlock final CTA
                checkUnlockStatus();
            }, 1500);
        }

        // === YOUTUBE SUBSCRIBE HANDLER (WITH 15s SMART TIMER) ===
        function handleYoutubeSubscribe() {
            if (youtubeSubscribed) return;

            // Open the channel in a new tab
            window.open('https://www.youtube.com/@aidude-1', '_blank');

            const ytBtn = document.getElementById('youtube-btn');
            const ytText = document.getElementById('youtube-btn-text');
            
            // Disable button interaction during countdown
            ytBtn.disabled = true;
            
            let timeLeft = 15;
            ytBtn.style.background = '#e5c158'; // Warm alert color during check
            ytBtn.style.boxShadow = '0 4px 24px rgba(229, 193, 88, 0.3)';
            ytText.innerHTML = `<div class="spinner" style="display:inline-block; vertical-align:middle; margin-left: 10px;"></div> جاري التحقق من الاشتراك... يرجى الانتظار (${timeLeft} ثانية)`;

            // Start Countdown
            const countdownInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    ytText.innerHTML = `<div class="spinner" style="display:inline-block; vertical-align:middle; margin-left: 10px;"></div> جاري التحقق من الاشتراك... يرجى الانتظار (${timeLeft} ثانية)`;
                } else {
                    clearInterval(countdownInterval);
                    
                    // Countdown complete, mark as subscribed
                    youtubeSubscribed = true;
                    ytBtn.disabled = false;
                    
                    // Convert to green success state
                    ytBtn.style.background = 'linear-gradient(135deg, var(--success), #16a34a)';
                    ytBtn.style.boxShadow = '0 4px 24px rgba(34, 197, 94, 0.3)';
                    ytText.textContent = 'تم التحقق من الاشتراك بنجاح ✔️';

                    // Attempt to unlock final CTA
                    checkUnlockStatus();
                }
            }, 1000);
        }

        // === UNLOCK LOGIC ===
        function checkUnlockStatus() {
            if (captchaSolved && youtubeSubscribed) {
                setTimeout(() => {
                    const finalCta = document.getElementById('final-cta');
                    finalCta.classList.add('visible');
                    finalCta.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 500);
            }
        }

        function claimCoins() {
            const btn = event.target;
            btn.textContent = '...جاري المعالجة';
            btn.style.pointerEvents = 'none';
            setTimeout(() => {
                btn.textContent = '🎉 تم بنجاح! ستصلك العملات قريباً';
                btn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
            }, 2000);
        }

        // Enter key support
        document.getElementById('tiktok-link').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
</html>
